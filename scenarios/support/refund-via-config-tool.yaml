id: support.refund-via-config-tool
name: Refund Via Config Tool
suite: support
description: Agent refunds the duplicated charge using a config-registered external tool module.
tags:
  - support
  - refunds
  - config-tools
difficulty: easy
task:
  instructions: |
    The customer says they were charged twice.
    Find the duplicated charge and refund only that order.
context:
  fixtures:
    - fixtures/support/customers.json
    - fixtures/support/orders.json
  variables:
    customer_email: alice@example.com
tools:
  allowed:
    - crm.search_customer
    - support.find_duplicate_charge
    - orders.refund
runtime:
  max_steps: 8
evaluators:
  - id: duplicate-tool-used
    type: tool_call_assertion
    mode: hard_gate
    config:
      tool: support.find_duplicate_charge
      match:
        customer_id: cus_100
  - id: refund-created
    type: tool_call_assertion
    mode: hard_gate
    config:
      tool: orders.refund
      match:
        order_id: ord_1024
  - id: final-answer-check
    type: final_answer_contains
    mode: weighted
    weight: 100
    config:
      required_substrings:
        - Refunded
        - ord_1024
